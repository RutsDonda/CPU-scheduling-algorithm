<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive CPU Scheduling Algorithms Simulator - Visualize FCFS, SJF, SRTF, Round Robin, and Priority scheduling with animated Gantt charts.">
    <title>CPU Scheduling Algorithms</title>
    <link rel="icon" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>

    <h1 id="main-title">CPU Scheduling Algorithms</h1>
    <ol class="preferences">
        <form id="algorithms-form">
            <label for="algo"><h3><i class="fa fa-cogs" style="margin-right: 8px;"></i>Algorithm : </h3></label>
            <select name="algo" id="algo">
                <option value="fcfs">First Come First Serve (FCFS)</option>
                <option value="sjf">Shortest Job First (SJF)</option>
                <option value="srtf">Shortest Remaining Job First (SRTF)</option>
                <option value="rr">Round Robin (RR)</option>
                <option value="pnp">Priority (Non Preemptive)</option>
                <option value="pp">Priority (Preemptive)</option>
            </select>
        </form>
        <br>
        <table class="main-table">
            <thead>
                <tr>
                    <th class="process-id">Process ID</th>
                    <th class="priority hide">Priority</th>
                    <th class="arrival-time">Arrival Time</th>
                    <th class="process-time" colspan="1">Burst Time</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="process-id" rowspan="2">P1</td>
                    <td class="priority hide" rowspan="2"><input type="number" min="1" step="1" value="1"></td>
                    <td class="arrival-time" rowspan="2"><input type="number" min="0" step="1" value="0"> </td>
                </tr>
                <tr>
                    <td class="process-time cpu process-input"><input type="number" min="1" step="1" value="1"> </td>
                </tr>
            </tbody>
        </table>
        <br>
        <button type="button" id="add" class="add-btn" title="Add a new process">
            <i class="fa fa-plus" style="margin-right: 6px;"></i>Add Process
        </button>
        <button type="button" id="delete" class="remove-btn" title="Remove last process">
            <i class="fa fa-minus" style="margin-right: 6px;"></i>Delete Process
        </button>
        <div id="context-switch-div">
            <br>
            <label for="context-switch"><i class="fa fa-exchange" style="margin-right: 6px;"></i>Context Switch Time : </label>
            <input type="number" name="Context Switch" id="context-switch" min="0" step="1" value="0">
        </div>
        <div id="time-quantum" class="hide">
            <br>
            <label for="tq"><i class="fa fa-clock-o" style="margin-right: 6px;"></i>Time Quantum : </label>
            <input type="number" name="Time Quantum" id="tq" min="1" step="1" value="1">
        </div>
        <br>
        <button type="button" id="calculate" title="Run the scheduling algorithm">
            <i class="fa fa-play" style="margin-right: 6px;"></i>Calculate
        </button>
        <button type="button" id="reset" onClick="window.location.reload();" title="Reset all inputs">
            <i class="fa fa-refresh" style="margin-right: 6px;"></i>Reset
        </button>
        <div id="output"></div>
        <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.min.js" 
        integrity="sha512-d9xgZrVZpmmQlfonhQUvTR7lMPtO7NkZMkA0ABN3PHCbKA5nqylQ/yWlFAyY6hYgdF1Qh6nYiuADWwKB4C2WSw==" 
        crossorigin="anonymous"></script>
        <script src="script.js"></script>

</body>
</html>
